<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard">
    <aside class="sidebar">
        <div class="sidebar-header">Student Portal</div>
        <ul class="sidebar-menu">
            <li><a href="#my-classes" class="active">Khóa học & Lịch học</a></li>
            <li><a href="#my-grades">Bảng điểm</a></li>
            <li><a href="#" onclick="logout()">Đăng xuất</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="header">
            <h2>Xin chào, Sinh viên (<span id="student-name">...</span>)</h2>
        </div>

        <section id="my-classes">
            <h3 class="section-title">Khóa học đã đăng ký & Lịch học</h3>
            <p style="margin-bottom: 15px; font-size: 14px; color: #7f8c8d;">
            </p>
            <table>
                <thead>
                    <tr>
                        <th>Mã Môn</th>
                        <th>Tên Môn</th>
                        <th>Mô tả</th>
                        <th>Lịch học</th>
                    </tr>
                </thead>
                <tbody id="student-courses-body">
                    </tbody>
            </table>
        </section>

        <section id="my-grades">
            <h3 class="section-title">Bảng điểm của tôi</h3>
            <p style="margin-bottom: 15px; font-size: 14px; color: #7f8c8d;">
            </p>
            <table>
                <thead>
                    <tr>
                        <th>Mã Môn</th>
                        <th>Tên Môn</th>
                        <th>Điểm số</th>
                        <th>Đánh giá</th>
                    </tr>
                </thead>
                <tbody id="student-grades-body">
                    <tr>
                        <td>1</td>
                        <td>Node.js Basics</td>
                        <td><strong style="color: #27ae60;" id="demo-grade">8.5</strong></td>
                        <td>Đạt</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser || currentUser.role !== 'student') {
            alert('Bạn không có quyền truy cập trang này!');
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        async function loadStudentData() {
            document.getElementById('student-name').innerText = currentUser.username;

            try {
                const res = await fetch('/courses');
                const courses = await res.json();
                const tbody = document.getElementById('student-courses-body');
                tbody.innerHTML = '';

                courses.forEach(course => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${course.id}</td>
                        <td>${course.name}</td>
                        <td>${course.description}</td>
                        <td><strong>${course.schedule || 'Chưa có lịch'}</strong></td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error("Lỗi khi tải dữ liệu khóa học:", error);
            }
        }

        window.onload = loadStudentData;
    </script>
</body>
</html>
