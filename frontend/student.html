<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard">
    <aside class="sidebar">
        <div class="sidebar-header">Student Portal</div>
        <ul class="sidebar-menu">
            <li><a href="#my-classes" class="active">Khóa học & Lịch học</a></li>
            <li><a href="#my-grades">Bảng điểm</a></li>
            <li><a href="index.html">Đăng xuất</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="header">
            <h2>Xin chào, Sinh viên (student1)</h2>
        </div>

        <section id="my-classes">
            <h3 class="section-title">Khóa học đã đăng ký & Lịch học</h3>
            <table>
                <thead>
                    <tr>
                        <th>Mã Môn</th>
                        <th>Tên Môn</th>
                        <th>Mô tả</th>
                        <th>Lịch học</th>
                        <th>Học kỳ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Node.js Basics</td>
                        <td>Intro to backend</td>
                        <td>Mon-Wed 9:00</td>
                        <td>2024A</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section id="my-grades">
            <h3 class="section-title">Bảng điểm của tôi</h3>
            <table>
                <thead>
                    <tr>
                        <th>Mã Môn</th>
                        <th>Tên Môn</th>
                        <th>Điểm số</th>
                        <th>Đánh giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Node.js Basics</td>
                        <td><strong style="color: #27ae60;">8.5</strong></td>
                        <td>Đạt</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
